<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ page.title | default: site.title }}</title>
<meta
  name="description"
  content="{{ page.description | default: site.description }}"
/>

<link rel="canonical" href="{{ page.url | absolute_url }}" />

<!-- Favicon -->
<link
  rel="icon"
  type="image/png"
  href="https://cdn.naviplus.app/naviplus/images/favicon_naviplus.png"
/>

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:title" content="{{ page.title | default: site.title }}" />
<meta
  property="og:description"
  content="{{ page.description | default: site.description }}"
/>
{% if site.social_image %}
<meta
  property="og:image"
  content="{{ site.url }}{{ site.social_image | relative_url }}"
/>
{% endif %}

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image" />
<meta property="twitter:url" content="{{ page.url | absolute_url }}" />
<meta
  property="twitter:title"
  content="{{ page.title | default: site.title }}"
/>
<meta
  property="twitter:description"
  content="{{ page.description | default: site.description }}"
/>
{% if site.social_image %}
<meta
  property="twitter:image"
  content="{{ site.url }}{{ site.social_image | relative_url }}"
/>
{% endif %} {% if site.twitter_username %}
<meta name="twitter:creator" content="{{ site.twitter_username }}" />
{% endif %}

<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
  crossorigin="anonymous"
/>
<!-- Remixicon CSS -->
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<link
  rel="stylesheet"
  href="{{ '/theme/assets/css/theme-styles.css' | relative_url }}"
/>

<script>
  (() => {
    try {
      const raw = localStorage.getItem("favorites") || "[]";
      const favorites = JSON.parse(raw);
      const count = Array.isArray(favorites) ? favorites.length : 0;
      if (count > 0) {
        const maxItems = 6;
        const rowHeight = 34;
        const reserved = Math.min(count, maxItems) * rowHeight;
        document.documentElement.classList.add("has-favorites");
        document.documentElement.style.setProperty(
          "--favorites-reserved-height",
          reserved + "px",
        );
      }
    } catch (e) {}
  })();
</script>
