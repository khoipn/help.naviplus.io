<div class="article-actions">
  <div class="article-actions-inner">
    <button class="action-btn" onclick="window.print()" title="Print page">
      <i class="ri-printer-line"></i>
    </button>
    <button class="action-btn" id="addFavoriteBtn" title="Add to Favorites">
      <i class="ri-flag-line"></i>
    </button>
    <button class="action-btn" id="exportPdfBtn" title="Export to PDF">
      <i class="ri-file-pdf-line"></i>
    </button>
    <a class="action-btn" id="emailSupportBtn" title="Email support">
      <i class="ri-mail-line"></i>
    </a>
    <button class="action-btn" id="sharePageBtn" title="Share page">
      <i class="ri-share-line"></i>
    </button>
  </div>
</div>
